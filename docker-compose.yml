services:
  octotech-frontend:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - /datastore/octotech/nginx-logs:/app/nginx-logs
      - /datastore/octotech/app:/src:ro
    networks:
      - edge
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        rm -rf /usr/share/nginx/html/*
        SITE_DIR=""
        if [ -f /src/index.html ]; then
          SITE_DIR="/src"
        elif [ -f /src/app/index.html ]; then
          SITE_DIR="/src/app"
        else
          FOUND_INDEX="$(find /src -maxdepth 6 -type f -name index.html 2>/dev/null | head -n 1 || true)"
          if [ -n "$FOUND_INDEX" ]; then
            SITE_DIR="$(dirname "$FOUND_INDEX")"
          fi
        fi
        if [ -z "$SITE_DIR" ]; then
          echo "ERROR: index.html not found under /datastore/octotech/app (mounted at /src)." >&2
          echo "HINT: unzip your site into /datastore/octotech/app (it must contain index.html, or a nested folder with index.html)." >&2
          ls -la /src >&2 || true
          exit 1
        fi
        cp -a "$SITE_DIR"/. /usr/share/nginx/html/
        cat > /etc/nginx/conf.d/default.conf <<'NGINXCONF'
        server {
          listen 80;
          server_name _;
          root /usr/share/nginx/html;
          index index.html;
          charset utf-8;

          access_log /app/nginx-logs/access.log;
          error_log  /app/nginx-logs/error.log;

          location /assets/ { try_files $uri =404; }
          location = /favicon.svg { try_files $uri =404; }
          location = /robots.txt { try_files $uri =404; }
          location = /sitemap.xml { try_files $uri =404; }
          location = /site.webmanifest {
            default_type application/manifest+json;
            try_files $uri =404;
          }

          location / { try_files $uri $uri/ /index.html; }
        }
        NGINXCONF
        nginx -g 'daemon off;'
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=edge'
      - 'traefik.http.routers.octotech.rule=Host(`octotech.az`) || Host(`www.octotech.az`) || Host(`agency.octotech.az`)'
      - 'traefik.http.routers.octotech.entrypoints=web'
      - 'traefik.http.services.octotech.loadbalancer.server.port=80'

networks:
  edge:
    external: true
