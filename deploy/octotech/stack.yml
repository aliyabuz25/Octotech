services:
  octotech-frontend:
    image: octotech-frontend:latest
    restart: unless-stopped
    volumes:
      - /datastore/octotech/nginx-logs:/app/nginx-logs
    networks:
      - edge
    labels:
      - 'traefik.enable=true'
      - 'traefik.docker.network=edge'
      - 'traefik.http.routers.octotech.rule=Host(`octotech.az`) || Host(`www.octotech.az`)'
      - 'traefik.http.routers.octotech.entrypoints=web'
      - 'traefik.http.services.octotech.loadbalancer.server.port=80'

networks:
  edge:
    external: true
